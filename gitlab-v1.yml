# Add this at the VERY TOP to prevent double-scanning!
workflow:
  rules:
    # 1. Run pipeline if it's a Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # 2. Run pipeline if someone pushes/merges directly to the default branch (e.g., main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - codepure_security_scan

codepure_devsecops_gate:
  stage: codepure_security_scan
  image: alpine:latest
  allow_failure:
    exit_codes: 3 # Tells GitLab: "If it exits with 3, turn Yellow and allow merge"
  before_script:
    # Install curl and jq so we can parse the backend response
    - apk add --no-cache curl jq
  script:
    - echo " Triggering Codepure DevSecOps Scan..."
    - |
      if [ -z "$CODEPURE_TOKEN" ]; then
        echo "ERROR: CODEPURE_TOKEN is missing! Please add it to your GitLab CI/CD Variables."
        exit 1
      fi

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://1798-2001-16a2-df2a-3700-6d57-96ff-cfb3-f25.ngrok-free.app/api/devsecops/scan/trigger" \
        -H "Authorization: Token $CODEPURE_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "project_id": "'"$CI_PROJECT_ID"'",
          "repo_name": "'"$CI_PROJECT_NAME"'",
          "branch": "'"$CI_COMMIT_REF_NAME"'",
          "base_branch": "'"${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"'",
          "commit_hash": "'"$CI_COMMIT_SHA"'",
          "provider": "gitlab",
          "triggered_by": "'"$GITLAB_USER_EMAIL"'"
        }')
      
      HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | head -n -1)
      
      if [ "$HTTP_STATUS" -ne 200 ]; then
         echo " FATAL: Failed to reach Codepure API (Status: $HTTP_STATUS)"
         echo "Response: $BODY"
         exit 1
      fi

      # Parse JSON response securely using jq
      API_STATUS=$(echo "$BODY" | jq -r '.status')
      API_MSG=$(echo "$BODY" | jq -r '.message')
      MD_SUMMARY=$(echo "$BODY" | jq -r '.markdown_summary')

      # Save the Markdown summary to a file
      echo "$MD_SUMMARY" > codepure_report.md

      # Print the Markdown directly to the GitLab Job Log
      echo ""
      echo "========================================================"
      cat codepure_report.md
      echo "========================================================"
      echo ""

      # Output Logic
      if [ "$API_STATUS" == "blocked" ]; then
        echo " SECURITY GATE FAILED: $API_MSG"
        exit 1
      fi

      if [ "$API_STATUS" == "warn" ]; then
        echo " AUDIT WARNING: $API_MSG"
        exit 3
      fi
      
      echo " Security Check Passed cleanly (or was skipped by policy)."
      
  # Expose as a downloadable artifact on the Merge Request page
  artifacts:
    when: always
    expose_as: 'Codepure DevSecOps Report'
    paths:
      - codepure_report.md
