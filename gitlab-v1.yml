stages:
  - codepure_security_scan

codepure_devsecops_gate:
  stage: codepure_security_scan
  image: alpine:latest
  allow_failure:
    exit_codes: 3 # Tells GitLab: "If it exits with 3, turn Yellow and allow merge"
  before_script:
    #  FIX 1: Install curl and jq so we can parse the backend response
    - apk add --no-cache curl jq
  script:
    - echo " Triggering Codepure DevSecOps Scan for $CI_COMMIT_REF_NAME..."
    - |
      if [ -z "$CODEPURE_TOKEN" ]; then
        echo " ERROR: CODEPURE_TOKEN is missing! Please add it to your GitLab CI/CD Variables."
        exit 1
      fi

      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://2cf5-2001-16a2-df52-ab00-2461-ad8a-e39f-a3b9.ngrok-free.ap/api/devsecops/scan/trigger" \
        -H "Authorization: Token $CODEPURE_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "project_id": "'"$CI_PROJECT_ID"'",
          "repo_name": "'"$CI_PROJECT_NAME"'",
          "branch": "'"$CI_COMMIT_REF_NAME"'",
          "commit_hash": "'"$CI_COMMIT_SHA"'",
          "provider": "gitlab",
          "triggered_by": "'"$GITLAB_USER_EMAIL"'"
        }')
      
      HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | head -n -1)
      
      if [ "$HTTP_STATUS" -ne 200 ]; then
         echo " FATAL: Failed to reach Codepure API (Status: $HTTP_STATUS)"
         echo "Response: $BODY"
         exit 1
      fi

      #  FIX 2: Parse JSON response securely using jq
      API_STATUS=$(echo "$BODY" | jq -r '.status')
      API_MSG=$(echo "$BODY" | jq -r '.message')
      MD_SUMMARY=$(echo "$BODY" | jq -r '.markdown_summary')

      #  FIX 3: Save the Markdown summary to a file
      echo "$MD_SUMMARY" > codepure_report.md

      #  FIX 4: Print the Markdown directly to the GitLab Job Log so developers can see it instantly!
      echo ""
      echo "========================================================"
      cat codepure_report.md
      echo "========================================================"
      echo ""

      # Output Logic
      if [ "$API_STATUS" == "blocked" ]; then
        echo " SECURITY GATE FAILED: $API_MSG"
        exit 1
      fi

      if [ "$API_STATUS" == "warn" ]; then
        echo " AUDIT WARNING: $API_MSG"
        exit 3
      fi
      
      echo " Security Check Passed cleanly."
      
  #  FIX 5: Expose as a downloadable artifact on the Merge Request page
  artifacts:
    when: always
    expose_as: 'Codepure DevSecOps Report'
    paths:
      - codepure_report.md
